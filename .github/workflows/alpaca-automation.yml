name: Alpaca Funding And Allocation

permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Trading mode"
        type: choice
        required: true
        default: paper
        options:
          - paper
          - live
      action:
        description: "Which automation action to run"
        type: choice
        required: true
        default: both
        options:
          - funding
          - allocation
          - both
      force_immediate:
        description: "Ignore configured schedules and run now"
        type: boolean
        required: true
        default: false

jobs:
  automate:
    runs-on: ubuntu-latest
    environment: alpaca-trading
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .

      - name: Run YAML automation
        shell: bash
        env:
          ALPACA_PAPER_API_KEY: ${{ secrets.ALPACA_PAPER_API_KEY }}
          ALPACA_PAPER_API_SECRET: ${{ secrets.ALPACA_PAPER_API_SECRET }}
          ALPACA_LIVE_API_KEY: ${{ secrets.ALPACA_LIVE_API_KEY }}
          ALPACA_LIVE_API_SECRET: ${{ secrets.ALPACA_LIVE_API_SECRET }}
          ALPACA_BROKER_API_KEY: ${{ secrets.ALPACA_BROKER_API_KEY }}
          ALPACA_BROKER_API_SECRET: ${{ secrets.ALPACA_BROKER_API_SECRET }}
          ALPACA_BROKER_ACCOUNT_ID: ${{ secrets.ALPACA_BROKER_ACCOUNT_ID }}
          ALPACA_BANK_RELATIONSHIP_ID: ${{ secrets.ALPACA_BANK_RELATIONSHIP_ID }}
          ALLOW_BROKER_FUNDING: ${{ secrets.ALLOW_BROKER_FUNDING }}
          ALLOW_REAL_ORDERS: ${{ secrets.ALLOW_REAL_ORDERS }}
          ALLOW_LIVE_TRADING: ${{ secrets.ALLOW_LIVE_TRADING }}
        run: |
          MODE="${{ github.event_name == 'schedule' && 'paper' || inputs.mode }}"
          ACTION="${{ github.event_name == 'schedule' && 'both' || inputs.action }}"
          FORCE_IMMEDIATE="${{ github.event_name == 'schedule' && 'false' || inputs.force_immediate }}"

          CMD=(python scripts/run_automation.py --config configs/automation.yaml --mode "$MODE" --action "$ACTION")
          if [[ "$FORCE_IMMEDIATE" == "true" ]]; then
            CMD+=(--force-immediate)
          fi

          echo "Executing: ${CMD[*]}"
          "${CMD[@]}"
